# Static analysis for GitHub Actions workflows using zizmor.
# Scans .github/workflows/*.yml for common CI/CD security issues
# (excessive permissions, dangerous triggers, template injection, etc.).
#
# Runs on pull_request (NOT pull_request_target) so untrusted PR code
# is executed with the fork's read-only GITHUB_TOKEN and no access to
# repository secrets. The workflow itself does not reference any secrets.
name: zizmor

on:
  pull_request:
  push:
    branches: [main]

# Default to read-only. Each job opts in to anything more.
permissions:
  contents: read

jobs:
  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required so zizmor-action can upload SARIF to GitHub code scanning.
      # If you do not have GitHub Advanced Security on a private repo (it is
      # free on public repos), drop this permission and the SARIF upload
      # step inside the action will be skipped.
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Don't leave the GITHUB_TOKEN sitting in .git/config for later steps.
          persist-credentials: false

      - name: Run zizmor
        # Pin to the major version. Dependabot (once enabled) will raise a PR
        # to bump this. If you disable Dependabot, replace this with a full
        # commit SHA per docs/security/github-actions-hardening.md §6.
        uses: zizmorcore/zizmor-action@v0.1.2
